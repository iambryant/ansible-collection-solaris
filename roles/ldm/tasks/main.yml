---
- name: "Ensure the target system is SPARC (sun4v) architecture"
  ansible.builtin.fail:
    msg: "This role requires the SPARC sun4v architecture to function. Detected: {{ ansible_facts['architecture'] }}"
  when: ansible_facts['architecture'] != 'sun4v'

- name: "Ensure Logical Domains Manager/Oracle VM Server for SPARC is installed"
  community.general.pkg5:
    name:
      - system/ldoms
      - system/ldoms/ldomsmanager
    state: present

- name: "Get LDOM facts and configurations"
  block:
    - name: "Check primary domain status and services"
      ansible.builtin.command: |
        ldm list-domain -o status primary;
        ldm list -p primary;
        ldm list-spconfig;
        ldm list-services -p primary
      register: ldm_raw_info
      changed_when: false

    - name: "Parse LDOM state into structured variables"
      ansible.builtin.set_fact:
        ldm_status_output: "{{ ldm_raw_info.stdout_lines[0] }}"
        ldm_config_output: "{{ ldm_raw_info.stdout_lines[1] }}"
        ldm_spconfigs: "{{ ldm_raw_info.stdout_lines[2] }}"
        ldm_services: "{{ ldm_raw_info.stdout_lines[3:] | join('\n') }}"

    - name: "Get currently assigned CPU cores and RAM for primary domain"
      ansible.builtin.set_fact:
        ldm_current_cores: >
          {{ ((ldm_current_config.stdout | regex_search('ncpu=[0-9]+')).split('=')[1] | int / 8) | int }}
        ldm_current_mem: >
          {{ ((ldm_current_config.stdout | regex_search('mem=[0-9]+')).split('=')[1] | int / 1024 / 1024 / 1024) | int }}

- name: "Ensure LDOM services are present"
  block:
    - name: "Ensure Virtual Console Concentrator (VCC) service is present"
      ansible.builtin.command: "ldm add-vcc port-range=5000-5100 {{ ldm_vcc_name }} primary"
      changed_when: true
      when: "ldm_vcc_name not in ldm_services"
      notify: "Rebuild SP config"

    - name: "Ensure Virtual Disk Server (VDS) service is present"
      ansible.builtin.command: "ldm add-vds {{ ldm_vds_name }} primary"
      changed_when: true
      when: "ldm_vds_name not in ldm_services"
      notify: "Rebuild SP config"

    - name: "Ensure Virtual Switch (VSW) service is present"
      ansible.builtin.command: "ldm add-vsw net-dev={{ ldm_vsw_lan }} {{ ldm_vsw_name }} primary"
      changed_when: true
      when: "ldm_vsw_name not in ldm_services"
      notify: "Rebuild SP config"

- name: "Ensure SP configuration is present"
  # This block only triggers if resource modifications are needed AND the primary is not already in delayed reconf.
  when:
    - "ldm_current_cores != (ldm_primary_cores | int) or ldm_current_mem != (ldm_primary_mem | int)"
    - "'delayed' not in ldm_status_output"
  block:
    - name: "Start delayed reconfiguration mode"
      ansible.builtin.command: "ldm start-reconf primary"
      changed_when: true

    - name: "Ensure CPU cores are assigned to primary domain"
      ansible.builtin.command: "ldm set-core {{ ldm_primary_cores }} primary"
      changed_when: true
      when: "ldm_current_cores != (ldm_primary_cores | int)"
      notify: "Rebuild SP config"

    - name: "Ensure RAM is assigned to primary domain"
      ansible.builtin.command: "ldm set-memory {{ ldm_primary_mem }}G primary"
      changed_when: true
      when: "ldm_current_mem != (ldm_primary_mem | int)"
      notify: "Rebuild SP config"

- name: "Ensure the virtual network terminal server daemon (vntsd) is enabled"
  ansible.builtin.service:
    name: "svc:/ldoms/vntsd:default"
    state: started
    enabled: true
