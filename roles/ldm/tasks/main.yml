---
- name: Gather raw LDM primary domain properties
  ansible.builtin.shell: "ldm list -p primary"
  register: ldm_current_config
  changed_when: false

- name: Extract exact core and memory values
  ansible.builtin.set_fact:
    ldm_current_cores: "{{ ((ldm_current_config.stdout | regex_search('ncpu=[0-9]+')).split('=')[1] | int / 8) | int }}"
    ldm_current_mem: "{{ ((ldm_current_config.stdout | regex_search('mem=[0-9]+')).split('=')[1] | int / 1024 / 1024) | int }}"

- name: Reconfigure Control Domain Resources
  when: >
    ldm_current_cores != (ldm_primary_cores | int) or
    ldm_current_mem != ((ldm_primary_mem | int) * 1024)
  notify: Save SP config
  block:
    - name: Enter Delayed Reconfiguration Mode
      ansible.builtin.command: "ldm start-reconf primary"

    - name: Set Strict CPU Core Constraint
      ansible.builtin.command: "ldm set-core {{ ldm_primary_cores }} primary"

    - name: Set Strict Memory Size Constraint
      ansible.builtin.command: "ldm set-memory {{ ldm_primary_mem }}G primary"
