---
- name: "Ensure the target system is SPARC (sun4v) architecture"
  ansible.builtin.fail:
    msg: "This role requires the SPARC sun4v architecture to function. Detected: {{ ansible_facts['architecture'] }}"
  when: ansible_architecture != 'sun4v'

- name: "Ensure LDM/Oracle VM Server for SPARC is installed"
  community.general.pkg5:
    name:
      - system/ldoms
      - system/ldoms/ldomsmanager
    state: present

- name: "Check if primary domain is already in delayed reconfiguration mode"
  ansible.builtin.command: "ldm list-domain -o status primary"
  register: ldm_current_status
  changed_when: false

- name: "Get current SP configuration for primary domain"
  ansible.builtin.command: "ldm list -p primary"
  register: ldm_current_config
  changed_when: false

- name: "Check if the SP configuration actually exists on the SP"
  ansible.builtin.command: "ldm list-spconfig"
  register: ldm_existing_config
  changed_when: false

- name: "Get currently assigned CPU cores and RAM for primary domain"
  ansible.builtin.set_fact:
    ldm_current_cores: >
      {{ ((ldm_current_config.stdout | regex_search('ncpu=[0-9]+')).split('=')[1] | int / 8) | int }}
    ldm_current_mem: >
      {{ ((ldm_current_config.stdout | regex_search('mem=[0-9]+')).split('=')[1] | int / 1024 / 1024 / 1024) | int }}

- name: "Ensure SP configuration is present"
  when:
    - >
      ldm_current_cores != (ldm_primary_cores | int) or
      ldm_current_mem != (ldm_primary_mem | int) or
      ldm_spconfig_name not in ldm_existing_config.stdout
    - "'delayed' not in ldm_current_status.stdout"
  block:
    - name: "Start delayed reconfiguration mode"
      ansible.builtin.command: "ldm start-reconf primary"
      when: ldm_current_cores != (ldm_primary_cores | int) or ldm_current_mem != (ldm_primary_mem | int)
      changed_when: true

    - name: "Ensure CPU cores are assigned to primary domain"
      ansible.builtin.command: "ldm set-core {{ ldm_primary_cores }} primary"
      when: ldm_current_cores != (ldm_primary_cores | int)
      changed_when: true

    - name: "Ensure RAM is assigned to primary domain"
      ansible.builtin.command: "ldm set-memory {{ ldm_primary_mem }}G primary"
      when: ldm_current_mem != (ldm_primary_mem | int)
      changed_when: true

    - name: "Remove existing SP configuration if it exists"
      ansible.builtin.command: "ldm remove-spconfig {{ ldm_spconfig_name }}"
      when: ldm_spconfig_name in ldm_existing_config.stdout
      changed_when: true

    - name: "Ensure new SP configuration is added"
      ansible.builtin.command: "ldm add-spconfig {{ ldm_spconfig_name }}"
      changed_when: true

- name: "Get current LDOM services status"
  ansible.builtin.command: ldm list-services -p primary
  register: ldm_current_services
  changed_when: false

- name: "Ensure Virtual Console Concentrator (VCC) service is preent"
  ansible.builtin.command: >
    ldm add-vcc port-range=5000-5100 {{ ldm_vcc_name }} primary
  changed_when: true
  when: ldm_vcc_name not in ldm_current_services.stdout

- name: "Ensure Virtual Disk Server (VDS) service is present"
  ansible.builtin.command: >
    ldm add-vds {{ ldm_vdsname }} primary
  changed_when: true
  when: ldm_vds_name not in ldm_current_services.stdout

- name: "Ensure Virtual Switch (VSW) service is present"
  ansible.builtin.command: >
    ldm add-vsw net-dev={{ ldm_vswitch_lan }} {{ ldm_vswitch_name }} primary
  changed_when: true
  when: ldm_vswitch_name not in ldm_current_services.stdout
